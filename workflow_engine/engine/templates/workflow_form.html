{% extends 'base.html' %}
{% block content %}

<style>

/* CENTER LAYOUT */
.form-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 75vh;
}

/* CARD */
.form-card {
    width: 500px;
    background: white;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

/* TITLE */
.form-title {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 20px;
}

/* LABEL */
.form-label {
    font-weight: 500;
    margin-bottom: 5px;
    display: block;
}

/* INPUT */
.form-control {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    margin-bottom: 15px;
    transition: 0.2s;
}

/* INPUT FOCUS */
.form-control:focus {
    border-color: #6366f1;
    outline: none;
    box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
}

/* BUTTON */
.btn-primary {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(45deg, #6366f1, #3b82f6);
    color: white;
    font-weight: 500;
    cursor: pointer;
}

/* BUTTON HOVER */
.btn-primary:hover {
    opacity: 0.9;
}

/* TEXTAREA */
textarea.form-control {
    resize: none;
}

/* HELPER TEXT */
.helper-text {
    font-size: 12px;
    color: #64748b;
    margin-top: -10px;
    margin-bottom: 10px;
}

</style>

<div class="form-container">

    <div class="form-card">

        <h3 class="form-title">⚙ Create Workflow</h3>

        <form method="post">
            {% csrf_token %}

            <label class="form-label">Workflow Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter workflow name">

            <label class="form-label">Input Schema (JSON)</label>
            <textarea name="input_schema" class="form-control" rows="5"
            placeholder='{
  "amount": {"type": "number", "required": true},
  "country": {"type": "string", "required": true},
  "priority": {"type": "string", "required": true, "allowed_values": ["High","Medium","Low"]}
}'></textarea>

            <div class="helper-text">
                Define input fields with type, required, and allowed values.
            </div>

            <button class="btn-primary">Save Workflow</button>

        </form>

    </div>

</div>

{% endblock %}
