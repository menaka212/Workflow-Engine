{% extends 'base.html' %}
{% block content %}

<style>

/* CENTER CONTAINER */
.form-center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 70vh;
}

/* CARD */
.form-card {
    width: 450px;
    background: white;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* TITLE */
.form-title {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 20px;
}

/* LABEL */
label {
    font-weight: 500;
    margin-bottom: 5px;
    display: block;
}

/* INPUT */
.form-control {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    margin-bottom: 15px;
    transition: 0.2s;
}

/* FOCUS */
.form-control:focus {
    border-color: #6366f1;
    outline: none;
    box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
}

/* BUTTON */
.btn-primary {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(45deg, #6366f1, #3b82f6);
    color: white;
    font-weight: 500;
    cursor: pointer;
}

/* HOVER */
.btn-primary:hover {
    opacity: 0.9;
}

/* HELPER TEXT */
.helper-text {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 10px;
}

</style>

<div class="form-center">

<div class="form-card">

<h3 class="form-title">✏ Edit Rule</h3>

<form method="post">
{% csrf_token %}

<label>Condition</label>
<input name="condition" value="{{rule.condition}}" class="form-control">

<label>Priority</label>
<input name="priority" value="{{rule.priority}}" class="form-control">

<div class="helper-text">
Lower priority value means higher importance.
</div>

<label>Next Step</label>
<select name="next_step" class="form-control">
{% for s in rule.step.workflow.step_set.all %}
<option value="{{s.id}}" {% if s.id == rule.next_step.id %}selected{% endif %}>
{{s.name}}
</option>
{% endfor %}
</select>

<button class="btn-primary">Update Rule</button>

</form>

</div>
</div>

{% endblock %}
